<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MathPlay Match-3</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        #grid { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 4px; background: #333; padding: 10px; border: 2px solid #ff007f; border-radius: 8px; }
        .tile { width: 40px; height: 40px; background: #555; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 4px; }
        .selected { outline: 3px solid #ff007f; transform: scale(0.9); }
    </style>
</head>
<body>
    <h1>MathPlay</h1>
    <div id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        const emojis = ['🍓', '💎', '🍀', '⭐️', '🔮'];
        let selectedTile = null;

        function createBoard() {
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                tile.addEventListener('click', function() {
                    if (selectedTile) {
                        // Міняємо місцями емодзі
                        let temp = this.innerHTML;
                        this.innerHTML = selectedTile.innerHTML;
                        selectedTile.innerHTML = temp;
                        selectedTile.classList.remove('selected');
                        selectedTile = null;
                    } else {
                        selectedTile = this;
                        this.classList.add('selected');
                    }
                });
                grid.appendChild(tile);
            }
        }
        createBoard();
    </script>
</body>
</html>
