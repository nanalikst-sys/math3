<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MathPlay Match-3</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #grid { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 2px; background: #333; padding: 5px; border-radius: 5px; }
        .tile { width: 40px; height: 40px; background: #444; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 3px; }
        .selected { background: #ff007f; }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script>
        const gridElement = document.getElementById('grid');
        const icons = ['🍓', '💎', '🍀', '⭐️', '🔮'];
        let grid = [];
        let selectedTile = null;

        function createBoard() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                tile.onclick = () => handleTileClick(i);
                gridElement.appendChild(tile);
                grid.push(tile);
            }
        }

        function handleTileClick(index) {
            if (selectedTile === null) {
                selectedTile = index;
                grid[index].classList.add('selected');
            } else {
                let diff = Math.abs(selectedTile - index);
                if (diff === 1 || diff === 8) {
                    swapTiles(selectedTile, index);
                    checkMatches();
                }
                grid[selectedTile].classList.remove('selected');
                selectedTile = null;
            }
        }

        function swapTiles(i, j) {
            let temp = grid[i].innerHTML;
            grid[i].innerHTML = grid[j].innerHTML;
            grid[j].innerHTML = temp;
        }

        function checkMatches() {
            // Простий алгоритм пошуку збігів по горизонталі
            for (let i = 0; i < 64; i++) {
                if (i % 8 < 6 && grid[i].innerHTML === grid[i+1].innerHTML && grid[i].innerHTML === grid[i+2].innerHTML) {
                    grid[i].innerHTML = grid[i+1].innerHTML = grid[i+2].innerHTML = '💥';
                    setTimeout(() => {
                        grid[i].innerHTML = grid[i+1].innerHTML = grid[i+2].innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    }, 500);
                }
            }
        }
        createBoard();
    </script>
</body>
</html>
