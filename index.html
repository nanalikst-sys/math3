<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MathPlay</title>
    <style>
        body { background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        #board { display: grid; grid-template-columns: repeat(5, 50px); gap: 5px; }
        .cell { width: 50px; height: 50px; background: #444; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 5px; }
        .selected { background: #ff007f; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        const board = document.getElementById('board');
        const icons = ['🍓', '💎', '🍀', '⭐️', '🔮'];
        let selected = null;

        for(let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = icons[Math.floor(Math.random() * icons.length)];
            cell.onclick = function() {
                if (selected) {
                    let temp = this.innerText;
                    this.innerText = selected.innerText;
                    selected.innerText = temp;
                    selected.classList.remove('selected');
                    selected = null;
                } else {
                    selected = this;
                    this.classList.add('selected');
                }
            };
            board.appendChild(cell);
        }
    </script>
</body>
</html>
