<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathPlay Cozy Match</title>
    <style>
        body { background: #fdf6e3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; touch-action: manipulation; }
        #ui { margin-bottom: 15px; font-size: 18px; color: #5d4037; font-weight: bold; text-align: center; }
        #grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; background: #d7ccc8; padding: 5px; border-radius: 10px; width: 95vw; max-width: 400px; aspect-ratio: 1/1; }
        .tile { background: #efebe9; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .selected { background: #bcaaa4 !important; transform: scale(0.9); }
        #musicBtn { margin-top: 20px; padding: 12px 24px; cursor: pointer; border-radius: 15px; border: none; background: #5d4037; color: white; font-size: 16px; }
    </style>
</head>
<body>
    <div id="ui">Рівень: 1 | Очки: 0<br>Збери: 10 🌸</div>
    <div id="grid"></div>
    <button id="musicBtn">🎵 Музика</button>
    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <script>
        const gridElement = document.getElementById('grid');
        const uiElement = document.getElementById('ui');
        const icons = ['🌸', '🍓', '💎', '⭐️', '🍀', '🍬'];
        let board = [], score = 0, level = 1, collectedFlowers = 0;
        let firstSelected = null;

        document.getElementById('musicBtn').onclick = (e) => {
            const m = document.getElementById('bgMusic');
            m.paused ? m.play() : m.pause();
        };

        function createBoard() {
            gridElement.innerHTML = '';
            board = [];
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = icons[Math.floor(Math.random() * icons.length)];
                tile.onclick = () => handleTileClick(i);
                gridElement.appendChild(tile);
                board.push(tile);
            }
        }

        function handleTileClick(i) {
            if (firstSelected === null) {
                firstSelected = i;
                board[i].classList.add('selected');
            } else {
                let diff = Math.abs(firstSelected - i);
                if (diff === 1 || diff === 8) {
                    swap(firstSelected, i);
                }
                board[firstSelected].classList.remove('selected');
                firstSelected = null;
            }
        }

        function swap(i, j) {
            let temp = board[i].innerText;
            board[i].innerText = board[j].innerText;
            board[j].innerText = temp;
            if (isMatchAt(i) || isMatchAt(j)) {
                checkMatches();
            } else {
                let temp = board[i].innerText;
                board[i].innerText = board[j].innerText;
                board[j].innerText = temp;
            }
        }

        function isMatchAt(i) {
            const r = Math.floor(i / 8), c = i % 8;
            const val = board[i].innerText;
            return (checkLine(r, c, 0, 1, val) >= 3 || checkLine(r, c, 1, 0, val) >= 3);
        }

        function checkLine(r, c, dr, dc, val) {
            let count = 1;
            for(let i=1; i<3; i++) { let nr = r + dr*i, nc = c + dc*i; if(nr<8 && nc<8 && board[nr*8+nc].innerText === val) count++; else break; }
            for(let i=1; i<3; i++) { let nr = r - dr*i, nc = c - dc*i; if(nr>=0 && nc>=0 && board[nr*8+nc].innerText === val) count++; else break; }
            return count;
        }

        function checkMatches() {
            let toRemove = new Set();
            for (let r = 0; r < 8; r++) for (let c = 0; c < 6; c++) {
                let i = r * 8 + c;
                if (board[i].innerText && board[i].innerText === board[i+1].innerText && board[i].innerText === board[i+2].innerText) {
                    toRemove.add(i); toRemove.add(i+1); toRemove.add(i+2);
                }
            }
            for (let c = 0; c < 8; c++) for (let r = 0; r < 6; r++) {
                let i = r * 8 + c;
                if (board[i].innerText && board[i].innerText === board[i+8].innerText && board[i].innerText === board[i+16].innerText) {
                    toRemove.add(i); toRemove.add(i+8); toRemove.add(i+16);
                }
            }

            if (toRemove.size > 0) {
                toRemove.forEach(i => {
                    if (board[i].innerText === '🌸') collectedFlowers++;
                    board[i].innerText = '';
                });
                score += toRemove.size * 10;
                if (collectedFlowers >= 10) { level++; collectedFlowers = 0; alert("Рівень пройдено!"); }
                uiElement.innerHTML = `Рівень: ${level} | Очки: ${score}<br>Збери: ${10 - collectedFlowers} 🌸`;
                setTimeout(dropTiles, 300);
            }
        }

        function dropTiles() {
            for (let c = 0; c < 8; c++) {
                for (let r = 7; r > 0; r--) {
                    if (board[r * 8 + c].innerText === '') {
                        for (let k = r - 1; k >= 0; k--) {
                            if (board[k * 8 + c].innerText !== '') {
                                board[r * 8 + c].innerText = board[k * 8 + c].innerText;
                                board[k * 8 + c].innerText = '';
                                break;
                            }
                        }
                    }
                }
            }
            for (let i = 0; i < 64; i++) {
                if (board[i].innerText === '') board[i].innerText = icons[Math.floor(Math.random() * icons.length)];
            }
            setTimeout(checkMatches, 300);
        }

        createBoard();
    </script>
</body>
</html>
