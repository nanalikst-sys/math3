<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nature Match</title>
    <style>
        :root { --bg: #e8f5e9; --tile: #ffffff; --accent: #2e7d32; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        #ui { margin-bottom: 15px; font-size: 20px; color: var(--accent); font-weight: bold; text-align: center; }
        #grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; background: #c8e6c9; padding: 10px; border-radius: 15px; width: 95vw; max-width: 400px; aspect-ratio: 1/1; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tile { background: var(--tile); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: grab; transition: 0.2s; }
        #musicBtn { margin-top: 20px; padding: 12px 25px; border-radius: 20px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">Рівень: 1 | Очки: 0<br>Збери: 15 🌸</div>
    <div id="grid"></div>
    <button id="musicBtn">🎵 Музика</button>
    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <script>
        const gridElement = document.getElementById('grid');
        const uiElement = document.getElementById('ui');
        const icons = ['🌸', '🌿', '🍄', '🍓', '🍀', '🦋'];
        let board = [], score = 0, level = 1, collectedFlowers = 0;

        document.getElementById('musicBtn').onclick = (e) => {
            const m = document.getElementById('bgMusic');
            m.paused ? m.play() : m.pause();
            e.target.innerText = m.paused ? "🎵 Музика" : "🔇 Музика";
        };

        function createBoard() {
            gridElement.innerHTML = '';
            board = [];
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = icons[Math.floor(Math.random() * icons.length)];
                tile.draggable = true;
                tile.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', i));
                tile.addEventListener('dragover', (e) => e.preventDefault());
                tile.addEventListener('drop', (e) => swap(e.dataTransfer.getData('text'), i));
                gridElement.appendChild(tile);
                board.push(tile);
            }
        }

        function swap(i, j) {
            let temp = board[i].innerText;
            board[i].innerText = board[j].innerText;
            board[j].innerText = temp;
            if (!checkMatches()) {
                setTimeout(() => {
                    let temp = board[i].innerText;
                    board[i].innerText = board[j].innerText;
                    board[j].innerText = temp;
                }, 300);
            }
        }

        function checkMatches() {
            let toRemove = new Set();
            for (let r = 0; r < 8; r++) for (let c = 0; c < 6; c++) {
                let i = r * 8 + c;
                if (board[i].innerText && board[i].innerText === board[i+1].innerText && board[i].innerText === board[i+2].innerText) {
                    toRemove.add(i); toRemove.add(i+1); toRemove.add(i+2);
                }
            }
            for (let c = 0; c < 8; c++) for (let r = 0; r < 6; r++) {
                let i = r * 8 + c;
                if (board[i].innerText && board[i].innerText === board[i+8].innerText && board[i].innerText === board[i+16].innerText) {
                    toRemove.add(i); toRemove.add(i+8); toRemove.add(i+16);
                }
            }

            if (toRemove.size > 0) {
                toRemove.forEach(i => {
                    if (board[i].innerText === '🌸') collectedFlowers++;
                    board[i].innerText = '';
                });
                score += toRemove.size * 10;
                if (collectedFlowers >= 15) { level++; collectedFlowers = 0; alert("Рівень пройдено!"); }
                uiElement.innerHTML = `Рівень: ${level} | Очки: ${score}<br>Збери: ${15 - collectedFlowers} 🌸`;
                setTimeout(dropTiles, 300);
                return true;
            }
            return false;
        }

        function dropTiles() {
            for (let c = 0; c < 8; c++) {
                for (let r = 7; r > 0; r--) {
                    if (board[r * 8 + c].innerText === '') {
                        for (let k = r - 1; k >= 0; k--) {
                            if (board[k * 8 + c].innerText !== '') {
                                board[r * 8 + c].innerText = board[k * 8 + c].innerText;
                                board[k * 8 + c].innerText = '';
                                break;
                            }
                        }
                    }
                }
            }
            for (let i = 0; i < 64; i++) {
                if (board[i].innerText === '') board[i].innerText = icons[Math.floor(Math.random() * icons.length)];
            }
            setTimeout(checkMatches, 300);
        }

        createBoard();
    </script>
</body>
</html>
