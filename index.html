<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Match-3 Cozy Game</title>
    <style>
        body { background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        #grid { display: grid; grid-template-columns: repeat(8, 45px); gap: 5px; background: #34495e; padding: 10px; border-radius: 10px; }
        .tile { width: 45px; height: 45px; background: #ecf0f1; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; transition: 0.3s; }
        .selected { outline: 4px solid #f1c40f; }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script>
        const gridElement = document.getElementById('grid');
        const icons = ['🍎', '🍋', '🍇', '🍒', '🍓', '🍑'];
        let board = Array(64).fill(null);
        let selected = null;

        function initBoard() {
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = icons[Math.floor(Math.random() * icons.length)];
                tile.onclick = () => handleTileClick(tile, i);
                gridElement.appendChild(tile);
                board[i] = tile;
            }
        }

        function handleTileClick(tile, i) {
            if (selected) {
                selected.classList.remove('selected');
                swap(selected, tile);
                selected = null;
                setTimeout(processMatches, 300);
            } else {
                selected = tile;
                selected.classList.add('selected');
            }
        }

        function swap(t1, t2) {
            let temp = t1.innerText;
            t1.innerText = t2.innerText;
            t2.innerText = temp;
        }

        function processMatches() {
            let found = false;
            // Проста перевірка горизонталей та вертикалей
            for (let i = 0; i < 64; i++) {
                // Горизонталь
                if (i % 8 < 6 && board[i].innerText === board[i+1].innerText && board[i].innerText === board[i+2].innerText) {
                    board[i].innerText = board[i+1].innerText = board[i+2].innerText = '✨';
                    found = true;
                }
            }
            if (found) {
                setTimeout(() => {
                    for(let i=0; i<64; i++) {
                        if(board[i].innerText === '✨') board[i].innerText = icons[Math.floor(Math.random() * icons.length)];
                    }
                }, 300);
            }
        }

        initBoard();
    </script>
</body>
</html>
