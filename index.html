<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPlay Match-3</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #grid { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 2px; background: #333; padding: 5px; border: 2px solid #ff007f; }
        .tile { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; background: #444; border-radius: 4px; }
        .selected { outline: 3px solid white; }
    </style>
</head>
<body>
    <h1>MathPlay</h1>
    <div id="score">Рахунок: 0</div>
    <div id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        const emojis = ['🍓', '💎', '🍀', '⭐️', '🔮'];
        let tiles = [];
        
        function createBoard() {
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                tile.addEventListener('click', () => {
                    if (tile.classList.contains('selected')) {
                        tile.classList.remove('selected');
                    } else {
                        tile.classList.add('selected');
                    }
                });
                grid.appendChild(tile);
            }
        }
        createBoard();
    </script>
</body>
</html>
