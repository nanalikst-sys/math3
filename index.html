<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MathPlay Cozy Match</title>
    <style>
        body { background: #fdf6e3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #ui { margin-bottom: 10px; font-size: 20px; color: #5d4037; font-weight: bold; text-align: center; }
        #grid { display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px); gap: 4px; background: #d7ccc8; padding: 10px; border-radius: 15px; }
        .tile { width: 50px; height: 50px; background: #efebe9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: grab; transition: 0.3s; }
        #musicBtn { margin-top: 15px; padding: 8px 16px; cursor: pointer; border-radius: 10px; border: none; background: #5d4037; color: white; }
    </style>
</head>
<body>
    <div id="ui">Рівень: 1 | Очки: 0<br>Збери: 10 🌸</div>
    <div id="grid"></div>
    <button id="musicBtn">🎵 Увімкнути музику</button>
    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <script>
        const gridElement = document.getElementById('grid');
        const uiElement = document.getElementById('ui');
        const icons = ['🌸', '🍓', '💎', '⭐️', '🍀', '🍬'];
        let board = [], score = 0, level = 1, collectedFlowers = 0;

        document.getElementById('musicBtn').onclick = (e) => {
            const m = document.getElementById('bgMusic');
            m.paused ? m.play() : m.pause();
            e.target.innerText = m.paused ? "🎵 Увімкнути музику" : "🔇 Вимкнути музику";
        };

        function createBoard() {
            gridElement.innerHTML = '';
            board = [];
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = icons[Math.floor(Math.random() * icons.length)];
                tile.draggable = true;
                tile.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', i));
                tile.addEventListener('dragover', (e) => e.preventDefault());
                tile.addEventListener('drop', (e) => swap(e.dataTransfer.getData('text'), i));
                gridElement.appendChild(tile);
                board.push(tile);
            }
        }

        function swap(i, j) {
            let temp = board[i].innerText;
            board[i].innerText = board[j].innerText;
            board[j].innerText = temp;
            if (!checkMatches()) {
                setTimeout(() => {
                    let temp = board[i].innerText;
                    board[i].innerText = board[j].innerText;
                    board[j].innerText = temp;
                }, 300);
            }
        }

        function checkMatches() {
            let toRemove = new Set();
            for (let r = 0; r < 8; r++) for (let c = 0; c < 6; c++) {
                let i = r * 8 + c;
                if (board[i].innerText && board[i].innerText === board[i+1].innerText && board[i].innerText === board[i+2].innerText) {
                    toRemove.add(i); toRemove.add(i+1); toRemove.add(i+2);
                }
            }
            for (let c = 0; c < 8; c++) for (let r = 0; r < 6; r++) {
                let i = r * 8 + c;
                if (board[i].innerText && board[i].innerText === board[i+8].innerText && board[i].innerText === board[i+16].innerText) {
                    toRemove.add(i); toRemove.add(i+8); toRemove.add(i+16);
                }
            }

            if (toRemove.size > 0) {
                toRemove.forEach(i => {
                    if (board[i].innerText === '🌸') collectedFlowers++;
                    board[i].innerText = '';
                });
                score += toRemove.size * 10;
                if (collectedFlowers >= 10) { level++; collectedFlowers = 0; alert("Рівень пройдено! Переходимо до " + level); }
                uiElement.innerHTML = `Рівень: ${level} | Очки: ${score}<br>Збери: ${10 - collectedFlowers} 🌸`;
                setTimeout(dropTiles, 300);
                return true;
            }
            return false;
        }

        function dropTiles() {
            for (let c = 0; c < 8; c++) {
                for (let r = 7; r > 0; r--) {
                    if (board[r * 8 + c].innerText === '') {
                        for (let k = r - 1; k >= 0; k--) {
                            if (board[k * 8 + c].innerText !== '') {
                                board[r * 8 + c].innerText = board[k * 8 + c].innerText;
                                board[k * 8 + c].innerText = '';
                                break;
                            }
                        }
                    }
                }
            }
            for (let i = 0; i < 64; i++) {
                if (board[i].innerText === '') board[i].innerText = icons[Math.floor(Math.random() * icons.length)];
            }
            setTimeout(checkMatches, 300);
        }

        createBoard();
    </script>
</body>
</html>
