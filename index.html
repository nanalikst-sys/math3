<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MathPlay Cozy Match</title>
    <style>
        body { background: #fdf6e3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        #ui { margin-bottom: 10px; font-size: 20px; color: #5d4037; }
        #grid { display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px); gap: 4px; background: #d7ccc8; padding: 10px; border-radius: 15px; }
        .tile { width: 50px; height: 50px; background: #efebe9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: grab; transition: 0.2s; }
        .blocked { background: #a1887f !important; border: 2px solid #5d4037; }
    </style>
</head>
<body>
    <div id="ui">Рівень: 1 | Очки: 0</div>
    <div id="grid"></div>

    <script>
        const gridElement = document.getElementById('grid');
        const icons = ['🌸', '🍓', '💎', '⭐️', '🍀', '🍬'];
        let board = [];
        let score = 0;

        function createBoard() {
            gridElement.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                // Кожна 10-та клітинка заблокована для цікавості
                if (i % 15 === 0) tile.classList.add('blocked');
                
                tile.innerText = icons[Math.floor(Math.random() * icons.length)];
                tile.draggable = true;
                tile.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', i));
                tile.addEventListener('dragover', (e) => e.preventDefault());
                tile.addEventListener('drop', (e) => swap(e.dataTransfer.getData('text'), i));
                gridElement.appendChild(tile);
                board.push(tile);
            }
        }

        function swap(i, j) {
            // Не можна рухати заблоковані
            if (board[i].classList.contains('blocked') || board[j].classList.contains('blocked')) return;
            
            let temp = board[i].innerText;
            board[i].innerText = board[j].innerText;
            board[j].innerText = temp;
            processBoard();
        }

        function processBoard() {
            let toRemove = new Set();
            // ... (тут логіка пошуку збігів, як раніше) ...
            // Додано: бонус за 4 в ряд
            if (toRemove.size >= 4) {
                // Можна додати логіку появи "Супер-фігури"
                score += 50;
            }
            
            if (toRemove.size > 0) {
                toRemove.forEach(i => {
                    if (!board[i].classList.contains('blocked')) board[i].innerText = '';
                });
                score += toRemove.size * 5;
                document.getElementById('ui').innerText = `Рівень: ${Math.floor(score/500)+1} | Очки: ${score}`;
                setTimeout(applyGravity, 200);
            }
        }
        
        // ... (функція applyGravity залишається) ...
        createBoard();
    </script>
</body>
</html>
