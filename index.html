<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPlay</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        #board { display: grid; grid-template-columns: repeat(5, 50px); gap: 5px; }
        .cell { width: 50px; height: 50px; background: #444; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        const board = document.getElementById('board');
        const icons = ['🍓', '💎', '🍀', '⭐️', '🔮'];
        for(let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = icons[Math.floor(Math.random() * icons.length)];
            board.appendChild(cell);
        }
    </script>
</body>
</html>
