<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nature Match</title>
    <style>
        :root { --bg: #e8f5e9; --tile: #a5d6a7; --accent: #2e7d32; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #header { text-align: center; margin-bottom: 20px; color: var(--accent); }
        #grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; background: #c8e6c9; padding: 12px; border-radius: 20px; width: 92vw; max-width: 450px; aspect-ratio: 1/1; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .tile { background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tile:active { transform: scale(0.85); }
        .selected { border: 3px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        #musicBtn { margin-top: 30px; padding: 12px 30px; border-radius: 25px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header">
        <h2 id="task">Рівень 1: Збери 15 🌸</h2>
        <div id="score">Очки: 0</div>
    </div>
    <div id="grid"></div>
    <button id="musicBtn">🎵 Музика природи</button>
    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <script>
        const grid = document.getElementById('grid');
        const taskText = document.getElementById('task');
        const icons = ['🌸', '🌿', '🍄', '🍓', '🍀', '🦋'];
        let board = [], score = 0, level = 1, needed = 15;
        let selected = null;

        function createBoard() {
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = icons[Math.floor(Math.random() * icons.length)];
                div.onclick = () => select(i, div);
                grid.appendChild(div);
                board.push(div);
            }
        }

        function select(i, el) {
            if (selected === null) {
                selected = i;
                el.classList.add('selected');
            } else {
                board[selected].classList.remove('selected');
                swap(selected, i);
                selected = null;
            }
        }

        function swap(i, j) {
            let temp = board[i].innerText;
            board[i].innerText = board[j].innerText;
            board[j].innerText = temp;
            if (!check()) { // Повертаємо, якщо немає збігу
                let temp = board[i].innerText;
                board[i].innerText = board[j].innerText;
                board[j].innerText = temp;
            }
        }

        function check() {

            // Додай сюди перевірку збігів та зменшення `needed`
        }

        createBoard();
    </script>
</body>
</html>
